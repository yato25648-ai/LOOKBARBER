<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lookbarber — Panel de barberos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0A0A0C; --surface:#141417; --surface-2:#1C1C20; --line:#2A2A2F;
    --red:#C8202F; --blue:#3E6BC4; --text:#F4F4F0; --muted:#8C8C94; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
  .display{font-family:'Anton',sans-serif;text-transform:uppercase;letter-spacing:.01em;}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;}

  /* LOGIN */
  #loginScreen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(ellipse 60% 50% at 50% 20%, rgba(200,32,47,.07), transparent 60%);
  }
  .login-box{width:100%;max-width:380px;}
  .login-logo{height:90px;width:auto;margin:0 auto 10px;display:block;}
  .logo{font-size:24px;text-align:center;margin-bottom:8px;}
  .logo span{color:var(--red);}
  .login-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:36px;}
  .barber-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
  .pick-card{
    background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:16px 8px;
    text-align:center;cursor:pointer;transition:.2s;
  }
  .pick-card.active{border-color:var(--red);background:var(--surface-2);}
  .pick-avatar{
    width:42px;height:42px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-family:'Anton';color:var(--red);
  }
  .pick-card.active .pick-avatar{border-color:var(--red);}
  .pick-card span{font-size:12px;font-weight:600;}
  .field{margin-bottom:18px;}
  .field label{display:block;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
  .field input{
    width:100%;background:var(--surface);border:1px solid var(--line);border-radius:8px;
    padding:14px;color:var(--text);font-size:18px;letter-spacing:.3em;text-align:center;font-family:'JetBrains Mono',monospace;
  }
  .field input:focus{outline:none;border-color:var(--red);}
  .btn{
    width:100%;padding:15px;border:none;border-radius:10px;font-weight:800;font-size:14px;
    text-transform:uppercase;letter-spacing:.04em;cursor:pointer;transition:.2s;
  }
  .btn-primary{background:var(--red);color:#0A0A0C;}
  .btn-primary:hover{filter:brightness(1.05);}
  .btn-primary:disabled{opacity:.5;}
  .login-msg{text-align:center;font-size:12px;color:var(--blue);margin-top:14px;min-height:16px;}

  /* DASHBOARD */
  #dashboard{display:none;}
  header.dash{
    position:sticky;top:0;z-index:10;background:rgba(10,10,12,.9);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;
  }
  .who{display:flex;align-items:center;gap:12px;}
  .who-avatar{
    width:40px;height:40px;border-radius:50%;background:var(--surface-2);border:1px solid var(--red);
    display:flex;align-items:center;justify-content:center;font-family:'Anton';color:var(--red);
  }
  .who-name{font-weight:700;font-size:15px;}
  .who-role{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
  .logout-btn{
    background:transparent;border:1px solid var(--line);color:var(--muted);padding:9px 16px;
    border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;
  }
  .logout-btn:hover{border-color:var(--blue);color:var(--blue);}

  .wrap{max-width:900px;margin:0 auto;padding:28px 20px 60px;}

  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:36px;}
  @media (max-width:700px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
  .stat-card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;
  }
  .stat-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
  .stat-value{font-family:'Anton';font-size:28px;}
  .stat-value.lime{color:var(--red);}

  .section-title{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
  .filter-tabs{display:flex;gap:8px;margin-bottom:16px;}
  .filter-tab{
    padding:8px 14px;border-radius:999px;border:1px solid var(--line);font-size:12px;font-weight:600;
    cursor:pointer;color:var(--muted);
  }
  .filter-tab.active{background:var(--text);color:#0A0A0C;border-color:var(--text);}

  .appt-list{display:flex;flex-direction:column;gap:10px;}
  .appt-card{
    background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px 18px;
    display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;
  }
  .appt-info{flex:1;min-width:180px;}
  .appt-client{font-weight:700;font-size:15px;}
  .appt-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:4px;}
  .status-badge{
    font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;border-radius:999px;
    text-transform:uppercase;font-weight:700;
  }
  .status-pendiente{background:rgba(200,32,47,.15);color:var(--red);}
  .status-completado{background:rgba(140,140,148,.15);color:var(--muted);}
  .status-cancelado{background:rgba(62,107,196,.15);color:var(--blue);}
  .appt-actions{display:flex;gap:8px;align-items:center;}
  .amount-input{
    width:90px;background:var(--surface-2);border:1px solid var(--line);border-radius:6px;
    padding:8px 10px;color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;
  }
  .mini-btn{
    background:var(--red);color:#0A0A0C;border:none;border-radius:6px;padding:9px 12px;
    font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;
  }
  .mini-btn.secondary{background:transparent;border:1px solid var(--line);color:var(--muted);}
  .empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
  .loading{text-align:center;padding:40px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:13px;}
  .config-warning{
    background:rgba(62,107,196,.1);border:1px solid var(--blue);color:var(--blue);
    padding:14px 18px;border-radius:10px;font-size:13px;margin-bottom:24px;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <img class="login-logo" src="logo.webp" alt="Look Barbershop Store">
    <p class="login-sub">Panel de control para barberos</p>

    <div class="barber-pick" id="barberPick"></div>

    <div class="field">
      <label>PIN</label>
      <input type="password" id="pinInput" maxlength="4" inputmode="numeric" placeholder="••••">
    </div>

    <button class="btn btn-primary" id="loginBtn">Entrar</button>
    <div class="login-msg" id="loginMsg"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header class="dash">
    <div class="who">
      <div class="who-avatar" id="whoAvatar"></div>
      <div>
        <div class="who-name" id="whoName"></div>
        <div class="who-role">PANEL DE BARBERO</div>
      </div>
    </div>
    <button class="logout-btn" id="logoutBtn">Salir</button>
  </header>

  <div class="wrap">
    <div id="configWarning" class="config-warning" style="display:none;">
      ⚠️ Falta conectar Supabase. Edita SUPABASE_URL y SUPABASE_ANON_KEY en este archivo para ver datos reales.
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Turnos pendientes</div>
        <div class="stat-value" id="statPending">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Cortes completados</div>
        <div class="stat-value lime" id="statCompleted">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Recaudado (mes)</div>
        <div class="stat-value lime" id="statMonth">$0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Recaudado (total)</div>
        <div class="stat-value" id="statTotal">$0</div>
      </div>
    </div>

    <div class="filter-tabs">
      <div class="filter-tab active" data-f="pendiente">Pendientes</div>
      <div class="filter-tab" data-f="completado">Completados</div>
      <div class="filter-tab" data-f="todos">Todos</div>
    </div>

    <div class="appt-list" id="apptList">
      <div class="loading">Cargando turnos...</div>
    </div>
  </div>
</div>

<script>
/* ====== CONFIGURACIÓN SUPABASE — pega aquí tus datos del proyecto ====== */
const SUPABASE_URL = "https://cbvzwwhdfxwlujmninov.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNidnp3d2hkZnh3bHVqbW5pbm92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NjkzNzgsImV4cCI6MjA5ODQ0NTM3OH0.MRAu8gLR9ScjftjFmwc6zhuJsUJwBCogZJBUOlSSr4w";
let sb = null;
let sbReady = false;
try{
  if(SUPABASE_URL.startsWith("http")){
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    sbReady = true;
  }
}catch(e){ console.warn("Supabase no configurado", e); }

const BARBERS = [
  { id:"diego",     name:"Diego" },
  { id:"sebastian", name:"Sebastián" },
  { id:"felipe",    name:"Felipe" }
];

let pickedBarberId = null;
let currentBarber = null;
let currentFilter = 'pendiente';
let appointments = [];

/* Render selector de barbero en login */
const barberPick = document.getElementById('barberPick');
BARBERS.forEach(b=>{
  const card = document.createElement('div');
  card.className = 'pick-card';
  card.dataset.id = b.id;
  card.innerHTML = `<div class="pick-avatar">${b.name[0]}</div><span>${b.name}</span>`;
  card.addEventListener('click', ()=>{
    pickedBarberId = b.id;
    document.querySelectorAll('.pick-card').forEach(c=>c.classList.toggle('active', c.dataset.id===b.id));
  });
  barberPick.appendChild(card);
});

document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('pinInput').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });

async function login(){
  const msgEl = document.getElementById('loginMsg');
  msgEl.textContent = '';
  if(!pickedBarberId){
    msgEl.textContent = 'Elige tu nombre primero.';
    return;
  }
  const pin = document.getElementById('pinInput').value.trim();
  if(!pin){
    msgEl.textContent = 'Ingresa tu PIN.';
    return;
  }

  if(!sbReady){
    msgEl.textContent = 'El panel aún no está conectado a la base de datos (ver instrucciones).';
    return;
  }

  msgEl.textContent = 'Verificando...';
  try{
    const { data, error } = await sb
      .from('barbers')
      .select('*')
      .eq('id', pickedBarberId)
      .eq('pin', pin)
      .single();

    if(error || !data){
      msgEl.textContent = 'PIN incorrecto.';
      return;
    }
    currentBarber = data;
    enterDashboard();
  }catch(err){
    console.error(err);
    msgEl.textContent = 'Error de conexión. Intenta de nuevo.';
  }
}

function enterDashboard(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('whoAvatar').textContent = currentBarber.name[0];
  document.getElementById('whoName').textContent = currentBarber.name;
  loadAppointments();
}

document.getElementById('logoutBtn').addEventListener('click', ()=>{
  currentBarber = null;
  pickedBarberId = null;
  document.getElementById('pinInput').value = '';
  document.querySelectorAll('.pick-card').forEach(c=>c.classList.remove('active'));
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
});

document.querySelectorAll('.filter-tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.f;
    renderList();
  });
});

async function loadAppointments(){
  const listEl = document.getElementById('apptList');
  if(!sbReady){
    document.getElementById('configWarning').style.display = 'block';
    listEl.innerHTML = '<div class="empty-state">Conecta Supabase para ver los turnos reales.</div>';
    return;
  }
  listEl.innerHTML = '<div class="loading">Cargando turnos...</div>';
  try{
    const { data, error } = await sb
      .from('appointments')
      .select('*')
      .eq('barber_id', currentBarber.id)
      .order('appt_date', { ascending: true })
      .order('appt_time', { ascending: true });

    if(error) throw error;
    appointments = data || [];
    renderStats();
    renderList();
  }catch(err){
    console.error(err);
    listEl.innerHTML = '<div class="empty-state">No se pudieron cargar los turnos.</div>';
  }
}

function money(n){
  return '$' + Number(n||0).toLocaleString('es-CO');
}

function renderStats(){
  const pending = appointments.filter(a=>a.status==='pendiente').length;
  const completed = appointments.filter(a=>a.status==='completado');
  const totalMoney = completed.reduce((s,a)=>s+Number(a.amount||0),0);

  const now = new Date();
  const monthMoney = completed
    .filter(a=>{
      const d = new Date(a.appt_date);
      return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    })
    .reduce((s,a)=>s+Number(a.amount||0),0);

  document.getElementById('statPending').textContent = pending;
  document.getElementById('statCompleted').textContent = completed.length;
  document.getElementById('statMonth').textContent = money(monthMoney);
  document.getElementById('statTotal').textContent = money(totalMoney);
}

function renderList(){
  const listEl = document.getElementById('apptList');
  let filtered = appointments;
  if(currentFilter !== 'todos'){
    filtered = appointments.filter(a=>a.status===currentFilter);
  }

  if(filtered.length===0){
    listEl.innerHTML = '<div class="empty-state">No hay turnos en esta vista.</div>';
    return;
  }

  listEl.innerHTML = '';
  filtered.forEach(a=>{
    const card = document.createElement('div');
    card.className = 'appt-card';
    const dateFmt = new Date(a.appt_date+'T00:00:00').toLocaleDateString('es-CO',{day:'numeric',month:'short'});

    let actionsHtml = '';
    if(a.status === 'pendiente'){
      actionsHtml = `
        <input type="number" class="amount-input" placeholder="Valor $" id="amt-${a.id}">
        <button class="mini-btn" onclick="completeAppt('${a.id}')">Completar</button>
        <button class="mini-btn secondary" onclick="cancelAppt('${a.id}')">Cancelar</button>
      `;
    } else if(a.status === 'completado'){
      actionsHtml = `<span class="status-badge status-completado">${money(a.amount)}</span>`;
    } else {
      actionsHtml = `<span class="status-badge status-cancelado">Cancelado</span>`;
    }

    card.innerHTML = `
      <div class="appt-info">
        <div class="appt-client">${a.client_name}</div>
        <div class="appt-meta">${dateFmt} · ${a.appt_time} ${a.service ? '· '+a.service : ''} ${a.client_phone ? '· '+a.client_phone : ''}</div>
      </div>
      <div class="appt-actions">
        ${a.status==='pendiente' ? `<span class="status-badge status-pendiente">Pendiente</span>` : ''}
        ${actionsHtml}
      </div>
    `;
    listEl.appendChild(card);
  });
}

async function completeAppt(id){
  const amtInput = document.getElementById('amt-'+id);
  const amount = amtInput ? Number(amtInput.value || 0) : 0;
  try{
    await sb.from('appointments').update({ status:'completado', amount }).eq('id', id);
    await loadAppointments();
  }catch(err){
    console.error(err);
    alert('No se pudo actualizar el turno.');
  }
}

async function cancelAppt(id){
  try{
    await sb.from('appointments').update({ status:'cancelado' }).eq('id', id);
    await loadAppointments();
  }catch(err){
    console.error(err);
    alert('No se pudo actualizar el turno.');
  }
}
</script>
</body>
</html>
